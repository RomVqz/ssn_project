services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: ssn-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ssn-postgres
          property: connectionString
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: SSN_PROGRAM_ID
        sync: false   # set manually in Render dashboard
      - key: PINATA_JWT
        sync: false
      - key: CORS_ORIGINS
        value: https://ssn.vercel.app
      - key: INDEXER_ENABLED
        value: "true"
      - key: INDEXER_POLL_INTERVAL_MS
        value: "5000"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
databases:
  - name: ssn-postgres
    databaseName: ssn_db
    user: ssn_user
    plan: free
